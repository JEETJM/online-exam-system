{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="glass-card form-card text-center">
            <div class="auth-icon danger-icon"><i class="bi bi-trash3-fill"></i></div>
            <h2 class="mb-3">Delete {{ type }}</h2>
            <p>Are you sure you want to delete this {{ type|lower }}?</p>
            <p class="fw-bold">{{ object }}</p>

            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                <a href="javascript:history.back()" class="btn btn-secondary px-4">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
