{% extends 'base.html' %}
{% block title %}Delete {{ type }} | ExamSphere{% endblock %}
{% block content %}

<div class="row justify-content-center align-items-center min-vh-75">
    <div class="col-lg-6">
        <div class="glass-card p-4 text-center">
            <div class="feature-icon mx-auto mb-3 orange">
                <i class="bi bi-trash3-fill"></i>
            </div>
            <h2>Delete {{ type }}</h2>
            <p class="text-muted mt-2">Are you sure you want to delete this {{ type|lower }}?</p>

            <form method="post" class="mt-4">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-3 flex-wrap">
                    <button type="submit" class="btn btn-danger px-4">
                        <i class="bi bi-trash me-2"></i>Yes, Delete
                    </button>
                    <a href="javascript:history.back()" class="btn btn-outline-dark px-4">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
