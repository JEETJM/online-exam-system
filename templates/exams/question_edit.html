{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="glass-card form-card">
            <h2 class="mb-4">Edit Question</h2>

            <form method="post">
                {% csrf_token %}
                <div class="row g-4">
                    <div class="col-12">
                        <label for="{{ form.question_text.id_for_label }}">Question</label>
                        {{ form.question_text }}
                    </div>

                    <div class="col-md-6">
                        <label for="{{ form.option_a.id_for_label }}">Option A</label>
                        {{ form.option_a }}
                    </div>

                    <div class="col-md-6">
                        <label for="{{ form.option_b.id_for_label }}">Option B</label>
                        {{ form.option_b }}
                    </div>

                    <div class="col-md-6">
                        <label for="{{ form.option_c.id_for_label }}">Option C</label>
                        {{ form.option_c }}
                    </div>

                    <div class="col-md-6">
                        <label for="{{ form.option_d.id_for_label }}">Option D</label>
                        {{ form.option_d }}
                    </div>

                    <div class="col-md-6">
                        <label for="{{ form.correct_option.id_for_label }}">Correct Option</label>
                        {{ form.correct_option }}
                    </div>

                    <div class="col-md-6">
                        <label for="{{ form.marks.id_for_label }}">Marks</label>
                        {{ form.marks }}
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-warning px-4 py-2">Update Question</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
