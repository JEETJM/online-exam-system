{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center min-vh-75">
    <div class="col-lg-5 col-md-7">
        <div class="glass-card form-card">
            <div class="text-center mb-4">
                <div class="auth-icon"><i class="bi bi-box-arrow-in-right"></i></div>
                <h2>Welcome Back</h2>
                <p class="text-muted mb-0">Login to continue to your dashboard</p>
            </div>

            {% if form.errors %}
                <div class="alert alert-danger rounded-4">Invalid username or password.</div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-gradient w-100 py-3">Login</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
